# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:coursemanagement}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server Configuration
server.port=${SERVER_PORT:8080}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:changeThisToAVeryLongSecretKeyInProductionAtLeast256BitsLong!!}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration (comma-separated allowed origins)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# File Upload Configuration
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# Logging
logging.level.com.coursemanagement=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
